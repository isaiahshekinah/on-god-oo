<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="./dist/output.css" rel="stylesheet" />

</head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center p-5 rounded-sm font-sans">

    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-8 pb-4 border border-gray-300">

        <h1 class="font-bold text-[28px] text-center mb-8">Registration Form</h1>

        <form class="space-y-8">

            <fieldset class="border border-gray-300 rounded-lg p-5 pt-2">
            <legend class="text-lg font-bold text-[#414141] px-2">
                Personal information
            </legend>

            <div class="space-y-6 mt-3">
                <div>
                    <label class="block text-md font-bold text-[#272727] mb-1" for="full-name">Full Name:</label>

                    <input type="text" placeholder="Enter your full name" class="w-full p-2 border border-gray-300 rounded bg-[#eeedea] text-gray-900 placeholder-gray-500 focus:outline-none focus:ring focus:ring-gray-600 placeholder:text-[14px]" id="full-name"/>
                </div>

                <div>
                <label class="block text-md font-bold text-[#272727] mb-1" for="email">Email:</label>

                <input type="email" placeholder="Enter your email address" class="border w-full p-2 border-gray-300 rounded bg-[#eeedea] text-gray-900 placeholder-gray-500 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[14px]" id="email"/>
                </div>

                <div>
                    <label class="block font-bold text-md text-[#272727] mb-1" for="password">Password:</label>

                    <input type="password" placeholder="Enter your password" class="border w-full p-2 border-gray-300 rounded bg-[#eeedea] text-gray-900 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[14px] placeholder-gray-500" id="password"/>
                </div>
            </div>
            </fieldset>

            <fieldset class="border border-gray-300 rounded-lg p-5 pt-2">
                <legend class="text-lg font-bold text-[#414141] px-2">Additional information</legend>

            <div class="space-y-6 mt-3">
                <div>
                   <label class="block font-bold text-md text-[#272727] mb-1" for="biography">Biography:</label>

                   <textarea placeholder="Tell us about yourself" rows="4" class="w-full border border-gray-300 rounded bg-[#eeedea] text-gray-900 p-2 placeholder-gray-500 resize-y focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[14px]" id="biography"></textarea>
                </div>

                <div>
                    <label class="block text-md font-bold text-[#272727] mb-1">Country:</label>

                    <select class="w-full p-2 border border-gray-300 rounded bg-[#eeedea] focus:outline-none focus:ring focus:ring-gray-500 text-[14px] text-gray-900">
                        <option value=""disabled selected>Select your country</option>
                        <option value="" class="bg-white">Australia</option>
                        <option value="" class="bg-white">Belgium</option>
                        <option value="" class="bg-white">Canada</option>
                        <option value="" class="bg-white">Denmark</option>
                        <option value="" class="bg-white">England</option>
                        <option value="" class="bg-white">Finland</option>
                    </select>
                </div>

                <div>
                    <label class="block text-lg font-light text-[#272727] mb-2">Gender:</label>

                    <div class="flex flex-wrap gap-4 text-gray-900 font-medium text-[15px]">
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="radio" name="gender" value="male" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Male</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="radio" name="gender" value="female" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Female</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="radio" name="gender" value="female" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Other</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="radio" name="gender" value="female" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Prefer not to say</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-lg font-light text-[#272727] mb-2">Interest:</label>

                    <div class="flex flex-wrap gap-4 text-gray-900 font-medium text-[15px]">
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="technology" value="technology" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Technology</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="sport" value="sport" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Sport</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="music" value="music" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Music</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="travel" value="travel" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Travel</span>
                        </label>

                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="reading" value="reading" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Reading</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="checkbox" name="eating" value="eating" class="w-3 h-3 text-gray-600 border-gray-300 focus:ring-0"/>
                            <span>Eating</span>
                        </label>
                    </div>
                </div>
            </div>
            </fieldset>

            <div class="bg-green-600 p-2 rounded-lg text-center -mt-3 hover:bg-green-700 shadow-xl cursor-pointer transform transition-all duration-300 ease-in hover:-translate-y-0.5 hover:shadow-lg text-white"><buuton>Register</buuton>
            </div>
            

        </form>
    </div>
</body>
</html>
