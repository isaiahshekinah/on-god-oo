<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="./dist/output.css" rel="stylesheet" />
    <style>
        a{
            cursor: pointer;
        }
    </style>

</head>
<body class="bg-[#f5f5f5] min-h-screen px-8 font-sans ">

    <header class="flex items-center justify-between py-3">
        <div class="font-extrabold text-[24px]">
        DVISSION
    </div>

    <nav class="bg-gray-100 ">
        <ul class="flex items-center gap-6 text-[15px]">
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">Pricing</a></li>
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">How it works</a></li>
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">Testimonials</a></li>
            <li class="bg-black text-white text-[14px] px-3 py-2 rounded-full hover:bg-gray-300 hover:text-black transition-all duration-300 ease-in"><a href="./index.html">Sign Up</a></li>
        </ul>
    </nav>
    </header>

    <main class="w-full max-w-xl p-8 pb-4 mt-10 mx-auto">

    <h1 class="text-center font-bold text-[24px]">Verify Email</h1>
    <p class="text-center text-gray-900 mt-3">A 6-Digit Verification Code has been sent to your email</p>
    <p class="text-center text-gray-900 mt-0">Enter the code below to verify your Email</p>

                <div class="mt-5">
                    <label class="block text-[14px] font-bold text-[#272727] mb-1" for="email">Enter code:</label>

                    <input type="email" class="w-full p-2 border border-gray-300 rounded bg-[#f5f5f5] text-gray-900focus:outline-none focus:ring focus:ring-gray-500 " id="email"/>
                </div>

                <div class="w-full  flex flex-col mt-4">
                <a href="./Login.html" class="w-full py-2.5 pr-2 text-center text-white border border-gray-300 rounded bg-black hover:bg-gray-300 hover:text-gray-900 text-[15px] transition-all duration-200 ease-in">
                    Verify
                </a>
                </div>
            
            <div class="flex justify-center mt-3">
                <a href="./Verify.html" class="text-blue-700 hover:text-blue-900 hover:underline">Resend Verification code</a>
            </div> 

                
    </main>

</html>
