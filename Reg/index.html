<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="./dist/output.css" rel="stylesheet" />
    <style>
        a{
            cursor: pointer;
        }
    </style>

</head>
<body class="bg-[#f5f5f5] min-h-screen px-8 font-sans ">

    <header class="flex items-center justify-between py-3">
        <div class="font-extrabold text-[24px]">
        DVISSION
    </div>

    <nav class="bg-gray-100 ">

        <ul class="flex items-center gap-6 text-[15px]">
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">Pricing</a></li>
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">How it works</a></li>
            <li class="hover:text-gray-500 hover:border-b-2 transition-colors duration-200 ease-in"><a href="#">Testimonials</a></li>
            <li class="bg-black text-white text-[14px] px-3 py-2 rounded-full hover:bg-gray-300 hover:text-black transition-all duration-300 ease-in"><a href="#">Get Started</a></li>
        </ul>
    </nav>
    </header>

    <main class="w-full max-w-xl p-8 pb-4 mt-10 mx-auto">
        
        <form>
        
                <h1 class="text-center font-bold text-[24px] mb-4">Sign Up</h1>

            <div class="space-y-4">
                <div>
                    <label class="block text-[14px] font-bold text-[#272727] mb-1" for="first-name">First Name:</label>

                    <input type="text" placeholder="Enter your first name" class="w-full p-2 border border-gray-300 rounded bg-[#f5f5f5] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[13px]" id="first-name"/>
                </div>

                <div>
                    <label class="block text-[14px] font-bold text-[#272727] mb-1" for="last-name">Last Name:</label>

                    <input type="text" placeholder="Enter your last name" class="w-full p-2 border border-gray-300 rounded bg-[#f5f5f5] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[13px]" id="last-name"/>
                </div>
               
                <div>
                    <label class="block text-[14px] font-bold text-[#272727] mb-1" for="email">Email Address:</label>

                    <input type="email" placeholder="Enter your email address" class="w-full p-2 border border-gray-300 rounded bg-[#f5f5f5] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[13px]" id="email"/>
                </div>
                
                <div>
                    <label class="block text-[14px] font-bold text-[#272727] mb-1" for="password">Password:</label>

                    <input type="password" placeholder="Enter your password" class="w-full p-2 border border-gray-300 rounded bg-[#f5f5f5] text-gray-900 placeholder-gray-400 focus:outline-none focus:ring focus:ring-gray-500 placeholder:text-[13px]" id="password"/>
                </div>

                <div>
                    <label class="flex cursor-pointer space-x-2 items-center text-[14px]">
                        <input type="checkbox"/>
                        <span>Accept Terms & Conditions</span>
                    </label>
                </div>

                <div class="w-full  flex flex-col">
                <a href="./index.html" class="w-full py-2.5 pr-2 text-center text-white border border-gray-300 rounded bg-black hover:bg-gray-300 hover:text-gray-900 text-[14px] transition-all duration-200 ease-in">
                    Join Us
                </a>
            </div>

              <div class="my-5 flex items-center text-sm text-gray-500"> 
                <div class="flex-grow border-t border-gray-400"></div>
                <span class="mx-4 flex-shrink text-black">or</span>
                <div class="flex-grow border-t border-gray-400"></div>
              </div>

              <div class="w-full  flex flex-col">
                <a href="./Verify.html"
                 target="_blank"
                rel="noopener noreferrer"
                class="w-full py-2.5 pl-2 text-center text-gray-900 border-2 border-gray-300 rounded bg-white  hover:bg-gray-300 hover:text-gray-900 text-[14px] transition-all duration-200 ease-in">
                    Sign up with Google
                </a>
            </div>

              <div class="w-full  flex flex-col -mt-2">
                <a href="./Verify.html"
                target="_blank"
                rel="noopener noreferrer"
                class="w-full py-2.5 text-center text-white border border-gray-300 rounded bg-black hover:bg-gray-300 hover:text-gray-900 text-[14px] transition-all duration-200 ease-in">
                    Sign up with Apple
                </a>
            </div>

            <div class="text-center text-[15px]">
                <p>Already have an account? <span class="text-blue-600 hover:underline"><a href="./Login.html">Login</a></span></p>
            </div>

            </div>

        </form>
    </main>

    
    
</body>
</html>
